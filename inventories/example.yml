proxmox:
  hosts:
    node1:
      ansible_host: 172.16.0.2
      ansible_hostname: node1
      ansible_user: root
      ansible_python_interpreter: "{{ ansible_user_home }}/venvs/default/bin/python"

    node2:
      ansible_host: 172.16.0.3
      ansible_hostname: node2
      ansible_user: root
      ansible_python_interpreter: "{{ ansible_user_home }}/venvs/default/bin/python"
    node3:
      ansible_host: 172.16.0.4
      ansible_hostname: node3
      ansible_user: root
      ansible_python_interpreter: "{{ ansible_user_home }}/venvs/default/bin/python"

proxmox_primary:
  hosts:
    node1:

proxmox_secondary:
  hosts:
    node2:
    node3:

power_panel:
  hosts:
    node1:

adguard:
  hosts:
    ag1:
      ansible_host: 172.16.0.13
      ansible_hostname: ag1
      ansible_user: root
      ansible_user_home: /root
      pve_host: node1
      keepalived:
        peer1_ip: 172.16.0.14
        peer2_ip: 172.16.0.15
        state: MASTER
        interface: eth0
        priority: 200
    ag2:
      ansible_host: 172.16.0.14
      ansible_hostname: ag2
      ansible_user: root
      ansible_user_home: /root
      pve_host: node2
      keepalived:
        peer1_ip: 172.16.0.13
        peer2_ip: 172.16.0.15
        state: BACKUP
        interface: eth0
        priority: 150
    ag3:
      ansible_host: 172.16.0.15
      ansible_hostname: ag3
      ansible_user: root
      ansible_user_home: /root
      pve_host: node3
      keepalived:
        peer1_ip: 172.16.0.14
        peer2_ip: 172.16.0.13
        state: BACKUP
        interface: eth0
        priority: 100

adguard_sync:
  hosts:
    agsync:
      ansible_host: 172.16.0.16
      ansible_hostname: agsync
      ansible_user: root
      ansible_user_home: /root
      pve_host: node1

omada_controller:
  hosts:
    omada:
      ansible_host: 172.16.0.8
      ansible_hostname: omada
      ansible_user: root
      ansible_user_home: /root
      pve_host: node2
      container_vols:
        - omada
        - certs

patch_group_1:
  hosts:
    node3:
    ag1:
    agsync:
    omada:

patch_group_2:
  hosts:
    node2:
    ag3:

patch_group_3:
  hosts:
    node1:
    ag2:

rclone_lxc:
  hosts:
    rclone:
      ansible_host: 172.16.0.17
      ansible_hostname: rclone
      ansible_user: root
      ansible_user_home: /root
      pve_host: amy
      backup_pfsense:
        - router
      backup_omada:
        - omada
      backup_adguard:
        - ag1