- name: Install Power Panel
  hosts: power_panel
  gather_facts: false
  vars_files:
    - ~/repos/secrets/secrets.yml
  vars:
    - powerpanel_version: 1.4.1
  roles:
    - powerpanel

- name: Build PVE Cluster
  hosts: proxmox
  gather_facts: true
  vars_files:
    - ~/repos/secrets/secrets.yml
  vars:
    ct_list:
      - "debian-12-standard_12.7-1_amd64.tar.zst"
      - "ubuntu-22.04-standard_22.04-1_amd64.tar.zst"
  roles:
    - pve
