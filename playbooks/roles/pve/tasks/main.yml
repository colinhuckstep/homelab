- name: Trust Hostkeys
  ansible.builtin.include_tasks: hostkeys.yml

- name: Create Cluster
  ansible.builtin.include_tasks: cluster-create.yml
  when: inventory_hostname in groups['proxmox_primary']

- name: Add Nodes to Cluster
  ansible.builtin.include_tasks: cluster-add-node.yml
  when: inventory_hostname in groups['proxmox_secondary']

- name: Update CT List
  ansible.builtin.command:
    cmd: "pveam update"
    creates: "/var/lib/pve-manager/apl-info/releases.turnkeylinux.org"

- name: "Download CT"
  ansible.builtin.command:
    cmd: "pveam download local {{ item }}"
    creates: "/var/lib/vz/template/cache/{{ item }}"
  loop: "{{ ct_list }}"
    
