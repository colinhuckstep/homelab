- name: Create TF User
  ansible.builtin.user:
    name: "{{ secret_pve_username }}"
    password: "{{ secret_pve_hashed_password }}"
    state: present

- name: Create Role, Privs and Cluster User
  when: inventory_hostname in groups['proxmox_primary']
  block:
    - name: Check Existing Roles # noqa no-changed-when
      ansible.builtin.shell: |
        pveum role list | grep TFProv
      register: cluster_roles

    - name: Check Existing Cluster Users # noqa no-changed-when
      ansible.builtin.shell: |
        pveum user list | grep {{ secret_pve_username }}@pam
      register: cluster_users

    - name: Create TF Role # noqa yaml[line-length]
      ansible.builtin.shell: |
        pveum role add TFProv -privs "Datastore.AllocateSpace Datastore.AllocateTemplate Datastore.Audit Pool.Allocate Sys.Audit Sys.Console Sys.Modify VM.Allocate VM.Audit VM.Clone VM.Config.CDROM VM.Config.Cloudinit VM.Config.CPU VM.Config.Disk VM.Config.HWType VM.Config.Memory VM.Config.Network VM.Config.Options VM.Migrate VM.Monitor VM.PowerMgmt SDN.Use"
      when: not cluster_roles.rc == 0

    - name: Add TF User to Cluster
      ansible.builtin.shell: |
        pveum user add {{ secret_pve_username }}@pam
      when: not cluster_users.rc == 0

    - name: Ad TF Privileges
      ansible.builtin.shell: |
        pveum aclmod / -user {{ secret_pve_username }}@pam -role TFProv