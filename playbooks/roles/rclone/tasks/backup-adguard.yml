- name: Copy adguard Backup Script
  ansible.builtin.copy:
    src: backup-adguard.sh
    dest: /backup/backup-adguard.sh
    mode: "0770"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Backup adguard service
  become: true
  ansible.builtin.template:
    src: backup-adguard.service.j2
    dest: /etc/systemd/system/backup-adguard.service
    mode: "0644"

- name: Backup adguard timer
  become: true
  ansible.builtin.copy:
    src: backup-adguard.timer
    dest: /etc/systemd/system/backup-adguard.timer
    mode: "0644"

- name: Enable adguard timer
  become: true
  ansible.builtin.systemd_service:
    name: backup-adguard.timer
    enabled: true
    daemon_reload: true
    state: started
