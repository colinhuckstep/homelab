- name: Copy omada Backup Script
  ansible.builtin.copy:
    src: backup-omada.sh
    dest: /backup/backup-omada.sh
    mode: "0770"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Backup omada service
  become: true
  ansible.builtin.template:
    src: backup-omada.service.j2
    dest: /etc/systemd/system/backup-omada.service
    mode: "0644"

- name: Backup omada timer
  become: true
  ansible.builtin.copy:
    src: backup-omada.timer
    dest: /etc/systemd/system/backup-omada.timer
    mode: "0644"

- name: Enable omada timer
  become: true
  ansible.builtin.systemd_service:
    name: backup-omada.timer
    enabled: true
    daemon_reload: true
    state: started
