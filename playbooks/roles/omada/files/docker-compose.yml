services:
  controller:
    image: mbentley/omada-controller:5.13
    restart: unless-stopped
    privileged: true
    environment:
      - MANAGE_HTTP_PORT=8088
      - MANAGE_HTTPS_PORT=8043
      - PORTAL_HTTP_PORT=8088
      - PORTAL_HTTPS_PORT=8043
      - SHOW_SERVER_LOGS=true
      - SHOW_MONGODB_LOGS=false
      - TZ=America/Indiana/Indianapolis
    volumes:
      - /container-vols/omada/data:/opt/tplink/EAPController/data
      - /container-vols/omada/backup:/opt/tplink/EAPController/data/autobackup
      - /container-vols/omada/logs:/opt/tplink/EAPController/logs
      - /container-vols/certs/omada.huckstep.org.fullchain:/cert/tls.crt
      - /container-vols/certs/omada.huckstep.org.key:/cert/tls.key
    # network_mode: host
    ports:
      - 80:8088
      - 443:8043
      - 8843:8843
      - 27001:27001/udp
      - 29810:29810/udp
      - 29811-29816:29811-29816