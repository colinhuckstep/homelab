- name: Install KeepaliveD
  become: true
  ansible.builtin.apt:
    name: keepalived
    state: present

- name: Configure KeepaliveD
  become: true
  ansible.builtin.copy:
    src: "{{ config_source }}/adguard/{{ inventory_hostname }}.conf"
    dest: /etc/keepalived/keepalived.conf
    mode: "0644"
  notify: 'Restart KeepaliveD'

- name: Create Certs Directory
  ansible.builtin.file:
    path: /container-vols/adguard/certs
    state: directory
    mode: "0770"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Copy Config
  ansible.builtin.copy:
    src: "{{ config_source }}/adguard/AdGuardHome.yaml"
    dest: /container-vols/adguard/config
    mode: "0770"
    force: false

- name: Copy Adguard Docker-Compose
  ansible.builtin.copy:
    src: adguard.yml
    dest: /container-vols/adguard/docker-compose.yml
    mode: "0770"

- name: Deploy Adguard
  community.docker.docker_compose_v2:
    project_src: /container-vols/adguard/
    state: present
    project_name: adguard
