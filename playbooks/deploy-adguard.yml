---
- name: Deploy Adguard LXCs
  hosts: localhost
  gather_facts: false
  vars_files:
    - ~/repos/secrets/secrets.yml
  environment:
    PM_USER: "{{ secret_pve_username }}"
    PM_PASS: "{{ secret_pve_password }}"
    AWS_ACCESS_KEY_ID: "{{ secret_tf_s3_key }}"
    AWS_SECRET_ACCESS_KEY: "{{ secret_tf_s3_secret }}"
    AWS_ENDPOINT_URL_S3: "{{ secret_tf_s3_endpoint }}"
    TF_VAR_lxc_nameserver: "{{ secret_resolver_router }}"
  roles:
    - lxc/adguard

- name: Install Adguard
  hosts: adguard
  gather_facts: false
  vars_files:
    - ~/repos/secrets/secrets.yml
  roles:
    - wait-for-host
    - ssh-keys
    - dns-cert
    - adguard

- name: Update Adguard LXCs DNS resolver
  hosts: localhost
  gather_facts: false
  vars_files:
    - ~/repos/secrets/secrets.yml
  environment:
    PM_USER: "{{ secret_pve_username }}"
    PM_PASS: "{{ secret_pve_password }}"
    AWS_ACCESS_KEY_ID: "{{ secret_tf_s3_key }}"
    AWS_SECRET_ACCESS_KEY: "{{ secret_tf_s3_secret }}"
    AWS_ENDPOINT_URL_S3: "{{ secret_tf_s3_endpoint }}"
    TF_VAR_lxc_nameserver: "{{ secret_resolver_adguard }}"
  roles:
    - adguard-lxc

- name: Install Adguard Sync
  hosts: adguard_sync
  gather_facts: false
  vars_files:
    - ~/repos/secrets/secrets.yml
  roles:
    - wait-for-host
    - ssh-keys
    - dns-cert
    - adguard-sync
